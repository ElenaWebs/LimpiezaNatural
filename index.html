<style>
:root{
  --bg: #f6f4ef;
  --bg-alt: #efece3;
  --card: #ffffff;
  --ink: #2b2a27;
  --ink-soft: #74705f;
  --ink-faint: #a8a190;
  --line: #e3ded2;
  --line-strong: #d2c9b7;
  --sage: #7f9788;
  --sage-deep: #4f6459;
  --sage-soft: #e5ebe4;
  --clay: #bf7c56;
  --clay-soft: #f2e3d5;
  --danger: #a8503f;
  --shadow: rgba(43,42,39,.08);
  --shadow-lift: rgba(43,42,39,.14);
  --radius: 18px;
  --radius-sm: 11px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Inter', -apple-system, "Segoe UI", sans-serif;
}
*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
h1,h2,h3,h4{ font-family: var(--font-display); font-weight: 500; color: var(--ink); margin:0 0 .3em; letter-spacing: .01em; }
p{ margin: 0 0 .7em; line-height: 1.55; }
button{ font-family: var(--font-body); cursor:pointer; border:none; background:none; padding:0; margin:0; color:inherit; text-align:inherit; font-size:inherit; -webkit-appearance:none; }
a{ color: var(--sage-deep); }
.app{ max-width: 720px; margin: 0 auto; padding: 22px 18px 80px; min-height: 100vh; }

/* ---------- topbar ---------- */
.topbar{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom: 30px; }
.brand{ display:flex; flex-direction:column; cursor:pointer; min-width:0; }
.brand h1{ font-size: 1.7rem; margin:0; overflow-wrap:break-word; }
.brand span{ font-size:.78rem; color: var(--ink-faint); letter-spacing:.06em; text-transform:uppercase; margin-top:2px; }
.top-actions{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.icon-btn{
  width:42px; height:42px; border-radius:50%; border:1px solid var(--line);
  background: var(--card); color: var(--ink); display:flex; align-items:center; justify-content:center;
  transition: box-shadow .15s ease, transform .15s ease, background .15s ease; flex-shrink:0;
}
.icon-btn:hover{ box-shadow: 0 4px 14px var(--shadow); transform: translateY(-1px); }
.icon-btn.admin-on{ background: var(--sage); border-color: var(--sage); color:#fff; }
.icon-btn svg{ width:19px; height:19px; }
.back-btn{ display:inline-flex; align-items:center; gap:6px; color: var(--ink-soft); font-size:.88rem; border:none; background:none; padding: 6px 0; margin-bottom: 14px; }
.back-btn svg{ width:16px; height:16px; }

/* ---------- home ---------- */
.hero-grid{ display:flex; flex-direction:column; gap:16px; margin-bottom: 28px; }
.credits-link{ display:block; margin: 18px auto 0; color: var(--ink-faint); font-size:.68rem; text-decoration: underline; text-underline-offset: 2px; }
.toast{
  position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(8px);
  background: var(--sage-deep); color: #fff; padding: 11px 20px; border-radius: 22px;
  font-size: .85rem; box-shadow: 0 6px 20px var(--shadow-lift); z-index: 70;
  opacity: 0; pointer-events: none; transition: opacity .25s ease, transform .25s ease; max-width: 88vw; text-align:center;
}
.toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
.tile{
  background: var(--card); border:1px solid var(--line); border-radius: var(--radius);
  padding: 34px 26px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px;
  box-shadow: 0 1px 3px var(--shadow); transition: box-shadow .18s ease, transform .18s ease, border-color .18s ease;
}
.tile:hover{ box-shadow: 0 10px 26px var(--shadow-lift); transform: translateY(-2px); border-color: var(--line-strong); }
.tile .tile-icon{ width:52px; height:52px; border-radius:50%; background: var(--sage-soft); color: var(--sage-deep); display:flex; align-items:center; justify-content:center; }
.tile .tile-icon svg{ width:26px; height:26px; }
.tile h2{ font-size: 1.32rem; }
.tile p{ color: var(--ink-soft); font-size:.9rem; margin:0; }
.dev-banner{
  background: var(--clay-soft); border:1px dashed var(--clay); color:#6b4127; border-radius: var(--radius-sm);
  padding: 12px 16px; font-size:.82rem; margin-bottom: 20px; line-height:1.5;
}
.dev-banner strong{ display:block; margin-bottom:2px; }
.seals-row{ display:flex; flex-wrap:wrap; gap:22px; justify-content:center; margin: 4px 0 32px; }
.seal{ display:flex; flex-direction:column; align-items:center; gap:10px; width: 92px; }
.seal-ring{
  width: 78px; height: 78px; border-radius: 50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background: var(--sage-soft); color: var(--sage-deep);
}
.seal-ring svg{ width:32px; height:32px; }
.seal-ring img{ width:32px; height:32px; object-fit:contain; }
.seal-text{ font-family: 'Questrial', var(--font-body); font-weight:700; font-size:.58rem; line-height:1.25; text-align:center; letter-spacing:-.01em; text-transform:uppercase; color: var(--sage-deep); }

/* ---------- puerta de acceso ---------- */
.login-gate{ min-height: 72vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:6px; padding: 20px; }
.login-gate h1{ font-size: 2rem; margin:0 0 16px; }
.login-gate p{ color: var(--ink-soft); max-width: 320px; }
.login-gate .pill-btn{ margin-top: 14px; }

/* ---------- lists ---------- */
.section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 18px; gap:10px; }
.section-head h1{ font-size: 1.5rem; }
.grid-cards{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:12px; }
.card{
  background: var(--card); border:1px solid var(--line); border-radius: var(--radius-sm);
  padding: 16px 14px; display:flex; flex-direction:column; gap:10px; align-items:flex-start;
  transition: box-shadow .15s ease, transform .15s ease; text-align:left; min-height: 128px;
  position: relative; cursor: pointer;
}
.card:hover{ box-shadow: 0 6px 18px var(--shadow); transform: translateY(-1px); }
.card .card-thumb{ width:100%; height:74px; border-radius:8px; object-fit:cover; background: var(--bg-alt); }
.add-to-list-btn{
  position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
  background: var(--sage-soft); color: var(--sage-deep); display:flex; align-items:center; justify-content:center;
  box-shadow: 0 1px 3px var(--shadow); transition: background .15s ease, color .15s ease;
}
.add-to-list-btn svg{ width:13px; height:13px; }
.add-to-list-btn:hover{ background: var(--sage); color:#fff; }
.card .card-thumb-placeholder{ width:100%; height:74px; border-radius:8px; background: var(--sage-soft); color: var(--sage-deep); display:flex; align-items:center; justify-content:center; }
.card .card-thumb-placeholder svg{ width:22px; height:22px; opacity:.7; }
.card h3{ font-size: 1rem; margin:0; }
.card .card-sub{ font-size:.78rem; color: var(--ink-faint); margin-top:-8px; }
.empty-state{ text-align:center; padding: 50px 20px; color: var(--ink-faint); }
.empty-state svg{ width:34px; height:34px; margin-bottom:10px; opacity:.5; }
.add-tile{
  border:1.5px dashed var(--line-strong); background:transparent; border-radius: var(--radius-sm);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; min-height:128px; color: var(--ink-soft); font-size:.85rem;
}
.add-tile:hover{ border-color: var(--sage); color: var(--sage-deep); }
.add-tile svg{ width:22px; height:22px; }

/* ---------- ficha ---------- */
.ficha-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom: 8px; }
.ficha-title{ font-size: 1.7rem; outline:none; }
.ficha-photo-wrap{ width:100%; border-radius: var(--radius); overflow:hidden; margin: 14px 0 22px; background: var(--bg-alt); }
.ficha-photo-wrap img{ width:100%; display:block; max-height: 320px; object-fit:cover; }
.ficha-photo-empty{ width:100%; height:150px; border-radius: var(--radius); background: var(--sage-soft); color: var(--sage-deep); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; margin:14px 0 22px; font-size:.82rem; }
.ficha-photo-empty svg{ width:26px; height:26px; opacity:.7; }
.producto-main-row{ display:flex; gap:20px; align-items:flex-start; }
.producto-fields-col{ flex:1; min-width:0; }
.producto-foto-col{ flex-shrink:0; width:120px; display:flex; flex-direction:column; align-items:center; }
.producto-foto-wrap{ width:120px; height:150px; border-radius: var(--radius-sm); overflow:hidden; background: var(--bg-alt); margin-bottom:8px; display:flex; align-items:center; justify-content:center; }
.producto-foto-wrap img{ width:100%; height:100%; object-fit:contain; display:block; }
.producto-foto-empty{ width:120px; height:150px; border-radius: var(--radius-sm); background: var(--sage-soft); color: var(--sage-deep); border:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; font-size:.68rem; text-align:center; padding:6px; margin-bottom:8px; }
.producto-foto-empty svg{ width:20px; height:20px; opacity:.8; }
@media (max-width: 560px){
  .producto-main-row{ flex-direction: column-reverse; }
  .producto-foto-col{ width:100%; }
  .producto-foto-wrap, .producto-foto-empty{ width:120px; }
}
.field-block{ margin-bottom: 22px; }
.field-label{ font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color: var(--ink-faint); margin-bottom:7px; display:block; }
.field-value{ outline:none; line-height:1.6; min-height: 1.4em; white-space: pre-wrap; }
.field-value.editable{ border-bottom:1px dashed var(--line-strong); padding-bottom:6px; }
.field-value:empty::before{ content: attr(data-placeholder); color: var(--ink-faint); font-style: italic; }
.card-actions-row{ display:flex; gap:8px; margin-top:22px; padding-top:18px; border-top:1px solid var(--line); }
.text-btn{ background:none; border:none; color: var(--ink-soft); font-size:.85rem; display:flex; align-items:center; gap:6px; padding:6px 4px; }
.text-btn:hover{ color: var(--danger); }
.text-btn svg{ width:15px; height:15px; }

/* ---------- producto/receta grid ---------- */
.subsection{ background: var(--card); border:1px solid var(--line); border-radius: var(--radius); padding: 20px 20px 6px; margin-bottom:18px; }
.subsection h4{ font-size: .95rem; color: var(--sage-deep); text-transform:uppercase; letter-spacing:.05em; margin-bottom: 16px; }
.mini-grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
.mini-grid .field-block{ margin-bottom:16px; }
.price-highlight{ background: var(--sage-soft); border-radius: var(--radius-sm); padding: 12px 16px; display:flex; align-items:baseline; gap:8px; margin: 4px 0 18px; }
.price-highlight .num{ font-family: var(--font-display); font-size:1.4rem; color: var(--sage-deep); }
.price-highlight .lbl{ font-size:.78rem; color: var(--ink-soft); }
select.field-value{ appearance:none; background: var(--bg-alt); border:1px solid var(--line); border-radius:8px; padding:6px 10px; font-family: var(--font-body); font-size:.9rem; }
.ingr-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.ingr-line{ display:flex; gap:8px; align-items:center; }
.ingr-cant{ width:52px; flex-shrink:0; border-bottom:1px dashed var(--line-strong); padding-bottom:5px; }
.ingr-unidad{ flex-shrink:0; appearance:none; background: var(--bg-alt); border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-family: var(--font-body); font-size:.82rem; }
.ingr-nombre{ flex:1; border-bottom:1px dashed var(--line-strong); padding-bottom:5px; }
.ingr-line-view{ padding:7px 0; border-bottom:1px solid var(--line); line-height:1.5; }
.ingr-line-view:last-child{ border-bottom:none; }
.pasos-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.paso-line{ display:flex; gap:8px; align-items:flex-start; }
.paso-num{ flex-shrink:0; font-weight:600; color: var(--ink-soft); padding-top:2px; }
.paso-txt{ flex:1; border-bottom:1px dashed var(--line-strong); padding-bottom:5px; }
.paso-line-view{ display:flex; gap:8px; padding:7px 0; border-bottom:1px solid var(--line); line-height:1.5; }
.paso-line-view:last-child{ border-bottom:none; }

/* ---------- calendario / lista compra ---------- */
.cal-section{ background: var(--card); border:1px solid var(--line); border-radius: var(--radius); padding: 18px 20px; margin-bottom:16px; }
.cal-section-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.cal-section-head h3{ font-size:1.05rem; }
.cal-task{ display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); }
.cal-task:last-child{ border-bottom:none; }
.cal-task .dot{ width:6px; height:6px; border-radius:50%; background: var(--sage); margin-top:9px; flex-shrink:0; }
.cal-task .txt{ flex:1; outline:none; line-height:1.5; }
.cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
.cal-nav h2{ font-size:1.2rem; margin:0; }
.cal-grid{ display:grid; grid-template-columns: repeat(7, 1fr); gap:6px; }
.cal-day-label{ text-align:center; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color: var(--ink-faint); padding-bottom:4px; }
.cal-day{ background: var(--card); border:1px solid var(--line); border-radius:10px; padding:6px; min-height:88px; display:flex; flex-direction:column; gap:4px; position:relative; }
.cal-day-empty{ background:transparent; border-color:transparent; }
.cal-day-today{ border-color: var(--sage); box-shadow: inset 0 0 0 1px var(--sage); }
.cal-day-num{ font-size:.78rem; color: var(--ink-soft); font-weight:600; }
.cal-day-today .cal-day-num{ color: var(--sage-deep); }
.cal-day-tasks{ display:flex; flex-direction:column; gap:3px; flex:1; }
.cal-day-task{ display:flex; align-items:flex-start; gap:3px; background: var(--sage-soft); color: var(--sage-deep); border-radius:5px; padding:2px 5px; font-size:.68rem; line-height:1.25; }
.cal-day-task span{ flex:1; word-break:break-word; }
.cal-day-task-del{ background:none; border:none; color: var(--sage-deep); font-size:.85rem; line-height:1; opacity:.6; flex-shrink:0; }
.cal-day-task-del:hover{ opacity:1; }
.cal-day-add{ align-self:flex-start; width:18px; height:18px; border-radius:50%; background: var(--bg-alt); color: var(--ink-soft); display:flex; align-items:center; justify-content:center; }
.cal-day-add svg{ width:10px; height:10px; }
.cal-day-add:hover{ background: var(--sage-soft); color: var(--sage-deep); }
@media print{
  .no-print{ display:none !important; }
  @page{ size: A4; margin: 14mm 16mm; }
  body{ background:#fff; }
  .app{ max-width:none; padding:0; }
  .cal-grid{ break-inside: avoid; }
  .cal-day{ break-inside: avoid; border-color:#ccc; }
  .cal-day-task{ background:#f0f0f0; color:#222; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cal-section{ break-inside: avoid; border-color:#ccc; box-shadow:none; }
}
.shop-item{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); }
.shop-item:last-child{ border-bottom:none; }
.shop-check{ width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line-strong); flex-shrink:0; display:flex; align-items:center; justify-content:center; background: var(--card); }
.shop-check svg{ width:12px; height:12px; opacity:0; }
.shop-item.done .shop-check{ background: var(--sage); border-color: var(--sage); }
.shop-item.done .shop-check svg{ opacity:1; color:#fff; }
.shop-item.done .shop-txt{ text-decoration: line-through; color: var(--ink-faint); }
.shop-txt{ flex:1; outline:none; }
.small-add-row{ display:flex; align-items:center; gap:8px; margin-top:10px; padding-top:10px; }
.small-add-row input{ flex:1; border:none; border-bottom:1px solid var(--line-strong); background:transparent; padding:6px 2px; font-family: var(--font-body); font-size:.92rem; outline:none; }
.small-add-row input:focus{ border-color: var(--sage); }
.pill-btn{ background: var(--sage); color:#fff; border:none; border-radius: 20px; padding: 9px 18px; font-size:.85rem; display:inline-flex; align-items:center; gap:6px; }
.pill-btn:hover{ background: var(--sage-deep); }
.pill-btn.ghost{ background:transparent; border:1px solid var(--line-strong); color: var(--ink-soft); }
.pill-btn.ghost:hover{ border-color: var(--sage); color: var(--sage-deep); }
.pill-btn.danger{ background: var(--danger); }
.pill-btn.danger:hover{ background:#8a3e30; }
.pill-btn svg{ width:15px; height:15px; }

/* ---------- modal ---------- */
.overlay{ position:fixed; inset:0; background: rgba(43,42,39,.32); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
.modal{ background: var(--card); border-radius: var(--radius); padding: 28px 26px; max-width: 360px; width:100%; }
.modal h3{ font-size:1.15rem; margin-bottom:10px; }
.modal p{ color: var(--ink-soft); font-size:.88rem; }
.modal-actions{ display:flex; gap:10px; margin-top: 18px; justify-content:flex-end; }
.modal input[type=text]{ width:100%; padding:10px 12px; border:1px solid var(--line-strong); border-radius:8px; font-family: var(--font-body); font-size:.95rem; margin-top:6px; outline:none; }
.modal input[type=text]:focus{ border-color: var(--sage); }
.admin-status{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.admin-status .avatar{ width:34px; height:34px; border-radius:50%; background: var(--sage-soft); color: var(--sage-deep); display:flex; align-items:center; justify-content:center; font-size:.8rem; font-weight:600; }

@media (min-width: 620px){
  .hero-grid{ flex-direction:row; }
  .tile{ flex:1; }
  .mini-grid{ grid-template-columns: 1fr 1fr; }
}
@media (max-width: 480px){
  .topbar{ flex-direction: column; align-items: stretch; gap: 12px; }
  .top-actions{ justify-content: flex-end; }
  .seals-row{ gap: 14px 16px; margin: 4px 0 24px; flex-wrap: wrap; }
  .seal{ width: 74px; gap: 7px; }
  .seal-ring{ width: 60px; height: 60px; }
  .seal-ring svg{ width:24px; height:24px; }
  .seal-ring img{ width:24px; height:24px; }
  .seal-text{ font-size:.52rem; line-height:1.2; }
}
</style>

function loadLocal(){
  try{
    const rawIngredientes = localStorage.getItem(LS_KEYS.ingredientes);
    ingredientesData = rawIngredientes === null ? {} : (JSON.parse(rawIngredientes) || {});
    let changed = rawIngredientes === null;
    for(const key in DEFAULT_INGREDIENTES){
      if(!(key in ingredientesData)){
        ingredientesData[key] = DEFAULT_INGREDIENTES[key];
        changed = true;
      }
    }
    if(changed) persistLocal("ingredientes");
  }catch(e){ ingredientesData = {}; }
  try{ formulasData = JSON.parse(localStorage.getItem(LS_KEYS.formulas)) || {}; }catch(e){ formulasData = {}; }
  try{ etiquetasInciData = JSON.parse(localStorage.getItem(LS_KEYS.etiquetasInci)) || {}; }catch(e){ etiquetasInciData = {}; }
  try{ categoriasGuiaData = JSON.parse(localStorage.getItem(LS_KEYS.categoriasGuia)) || {}; }catch(e){ categoriasGuiaData = {}; }
  try{ calendarioData = JSON.parse(localStorage.getItem(LS_KEYS.calendario)) || { tareasPorDia: {}, secciones: [] }; }catch(e){ calendarioData = { tareasPorDia: {}, secciones: [] }; }
  try{ listaCompraData = JSON.parse(localStorage.getItem(LS_KEYS.lista)) || { items: [] }; }catch(e){ listaCompraData = { items: [] }; }
  try{ devAdminMode = localStorage.getItem(LS_KEYS.devAdmin) === "1"; }catch(e){ devAdminMode = false; }
}
function persistLocal(key){
  const map = { ingredientes: ingredientesData, formulas: formulasData, etiquetasInci: etiquetasInciData, categoriasGuia: categoriasGuiaData, calendario: calendarioData, lista: listaCompraData };
  try{ localStorage.setItem(LS_KEYS[key], JSON.stringify(map[key])); }catch(e){}
}

/* --------- Firestore listeners (solo si USE_FIREBASE) --------- */
let ingredientesSnapshotSeen = false;
let ingredientesSeeded = false;
function maybeSeedIngredientes(){
  if(ingredientesSeeded || !ingredientesSnapshotSeen || !isAdmin()) return;
  const missing = Object.entries(DEFAULT_INGREDIENTES).filter(([id])=> !(id in ingredientesData));
  if(missing.length === 0) return;
  ingredientesSeeded = true;
  const db = firebase.firestore();
  missing.forEach(([id,data])=>{
    db.collection("ingredientes").doc(id).set(data).catch(()=>{});
  });
}
function startFirestoreListeners(){
  const db = firebase.firestore();
  db.collection("ingredientes").onSnapshot(snap=>{
    const next = {}; snap.forEach(doc=> next[doc.id] = doc.data()); ingredientesData = next;
    ingredientesSnapshotSeen = true;
    renderApp();
    maybeSeedIngredientes();
  }, ()=>{});
  db.collection("formulas").onSnapshot(snap=>{
    const next = {}; snap.forEach(doc=> next[doc.id] = doc.data()); formulasData = next; renderApp();
  }, ()=>{});
  db.collection("etiquetasInci").onSnapshot(snap=>{
    const next = {}; snap.forEach(doc=> next[doc.id] = doc.data()); etiquetasInciData = next; renderApp();
  }, ()=>{});
  db.collection("categoriasGuia").onSnapshot(snap=>{
    const next = {}; snap.forEach(doc=> next[doc.id] = doc.data()); categoriasGuiaData = next; renderApp();
  }, ()=>{});
  db.collection("contenido").doc("calendario").onSnapshot(doc=>{
    calendarioData = doc.exists ? doc.data() : { tareasPorDia: {}, secciones: [] }; renderApp();
  }, ()=>{});
  db.collection("contenido").doc("listaCompra").onSnapshot(doc=>{
    listaCompraData = doc.exists ? doc.data() : { items: [] }; renderApp();
  }, ()=>{});
}

function initFirebase(){
  const looksConfigured = firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith("TU_");
  if(!looksConfigured || typeof firebase === "undefined"){
    loadLocal();
    authReady = true;
    renderApp();
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    firebase.firestore().enablePersistence({synchronizeTabs:true}).catch(()=>{});
    USE_FIREBASE = true;
    startFirestoreListeners();
    firebase.auth().getRedirectResult().catch(()=>{});
    firebase.auth().onAuthStateChanged(user=>{
      currentUser = user;
      authReady = true;
      if(user){ upsertUserProfile(user); }
      renderApp();
      maybeSeedIngredientes();
    });
  }catch(e){
    USE_FIREBASE = false;
    loadLocal();
    authReady = true;
    renderApp();
  }
}

  const provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });
  firebase.auth().signInWithPopup(provider).catch(()=>{
    firebase.auth().signInWithRedirect(provider).catch(err=>{
      openAlert({ title:"No se ha podido iniciar sesión", message: err.message || String(err) });
    });
  });
}
function signOutUser(){ firebase.auth().signOut(); }

function upsertUserProfile(user){
  const ref = firebase.firestore().collection("usuarios").doc(user.uid);
  ref.get().then(doc=>{
    const data = {
      email: user.email || "",
      nombre: user.displayName || "",
      ultimoAcceso: firebase.firestore.FieldValue.serverTimestamp()
    };
    if(!doc.exists){ data.fechaAlta = firebase.firestore.FieldValue.serverTimestamp(); }
    ref.set(data, {merge:true}).catch(()=>{});
  }).catch(()=>{});
}

   Persistencia genérica de colecciones
   ========================================================= */
function saveDoc(collection, id, data){
  const store = getStoreFor(collection);
  store[id] = { ...(store[id]||{}), ...data };
  if(USE_FIREBASE){
    firebase.firestore().collection(collection).doc(id).set(data, {merge:true}).catch(()=>{});
  } else {
    persistLocal(collection);
  }
}
function deleteDoc(collection, id){
  delete getStoreFor(collection)[id];
  if(USE_FIREBASE){
    firebase.firestore().collection(collection).doc(id).delete().catch(()=>{});
  } else {
    persistLocal(collection);
  }
}
function saveContenido(key, data){
  if(key === "calendario") calendarioData = data;
  if(key === "lista") listaCompraData = data;
  if(USE_FIREBASE){
    const docId = key === "calendario" ? "calendario" : "listaCompra";
    firebase.firestore().collection("contenido").doc(docId).set(data).catch(()=>{});
  } else {
    persistLocal(key);
  }
}

   ========================================================= */
const PHOTO_ACCEPT = "image/jpeg,image/png,image/gif,image/webp";
function readImageCompressed(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    if(!file.type || !file.type.startsWith("image/")){ reject(new Error("Ese archivo no es una imagen compatible.")); return; }
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error("No se ha podido leer el archivo."));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=> reject(new Error("No se ha podido abrir la imagen."));
      img.onload = ()=>{
        let w = img.naturalWidth, h = img.naturalHeight;
        if(w > maxDim || h > maxDim){
          if(w >= h){ h = Math.round(h * maxDim / w); w = maxDim; } else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
let pendingPhotoTarget = null;
document.getElementById("hiddenPhotoInput").addEventListener("change", e=>{
  const file = e.target.files[0];
  e.target.value = "";
  if(!file || !pendingPhotoTarget) return;
  readImageCompressed(file, 900, 0.75).then(dataUrl=>{
    saveDoc(pendingPhotoTarget.collection, pendingPhotoTarget.id, { foto: dataUrl });
    renderApp();
  }).catch(err=> openAlert({ title:"No se ha podido procesar la imagen", message: err.message || "Prueba con otra foto." }));
});

  const showAddToList = kind === "ingredientes" && adminOn;
  let cardsHtml = items.map(([id, d])=> `
    <div class="card" data-action="open-${meta.openScreen}" data-id="${id}" tabindex="0" role="button">
      <div class="card-thumb-placeholder">${icon(meta.emptyIcon)}</div>
      <h3>${escapeHtml(d.nombre || "Sin nombre")}</h3>
      ${d.subtitulo ? `<div class="card-sub">${escapeHtml(d.subtitulo)}</div>` : ""}

  const receta = d.receta || {};
  const producto = d.producto || {};
  const cantidad = toNumber(producto.cantidad);
  let precio = toNumber(producto.precioEnvase);
  if(producto.monedaUnidad === "cent" && !isNaN(precio)) precio = precio / 100;
  let priceLine = "";
  if(cantidad > 0 && precio > 0){
    const unidad = producto.unidad || "ml";
    let perBase, baseLabel;
    if(unidad === "ml"){ perBase = precio / (cantidad/1000); baseLabel = "litro"; }
    else if(unidad === "L"){ perBase = precio / cantidad; baseLabel = "litro"; }
    else if(unidad === "g"){ perBase = precio / (cantidad/1000); baseLabel = "kg"; }
    else { perBase = precio / cantidad; baseLabel = "kg"; }
    priceLine = `<div class="price-highlight"><span class="num">${perBase.toFixed(2)} €</span><span class="lbl">por ${baseLabel}</span></div>`;

  const ingredientesList = receta.ingredientesList || [];

  const hasReceta = adminOn || pasosList.length > 0 || receta.notas || receta.rendimientoCantidad || ingredientesList.length > 0;

    ` : ""}
    ${renderRecetaIngredientesList(ingredientesList, id, adminOn)}
    ${renderRecetaPasosList(pasosList, id, adminOn)}
    ${renderSubField("Notas", "notas", receta.notas, "formulas", id, "receta", adminOn, "Conservación, variantes...")}
  </div>` : ""}

  ${hasProducto ? `
  <div class="subsection">
    <h4>Producto comercial</h4>
    <div class="mini-grid">
      ${renderSubField("Marca / producto", "marca", producto.marca, "formulas", id, "producto", adminOn, "Nombre del producto")}
      ${renderSubField("Tienda", "tienda", producto.tienda, "formulas", id, "producto", adminOn, "Dónde lo compro")}
    </div>
    <div class="producto-main-row">
      <div class="producto-fields-col">
        <div class="mini-grid">
          ${renderSubField("Cantidad del envase", "cantidad", producto.cantidad, "formulas", id, "producto", adminOn, "Ej. 750", "number")}
          ${renderUnidadField(producto.unidad, id, adminOn)}
          ${renderSubField(`Precio del envase`, "precioEnvase", producto.precioEnvase, "formulas", id, "producto", adminOn, "Ej. 3.20", "number")}
          ${renderMonedaUnidadField(producto.monedaUnidad, id, adminOn)}
        </div>
      </div>
      ${renderProductoFotoSmall(d, id, adminOn)}
    </div>
    ${priceLine}
    ${producto.link || adminOn ? `<div class="field-block"><span class="field-label">Enlace</span><div class="field-value ${ed}" contenteditable="${editAttr}" data-field="link" data-collection="formulas" data-id="${id}" data-sub="producto" data-placeholder="https://...">${escapeHtml(producto.link||"")}</div>${producto.link ? `<a href="${escapeHtml(producto.link)}" target="_blank" rel="noopener" class="text-btn" style="margin-top:6px;">${icon("externalLink")}Abrir enlace</a>` : ""}</div>` : ""}

/* ---------- calendario ---------- */
const MESES_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_ES = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
function pad2(n){ return String(n).padStart(2,"0"); }
function dateKey(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function renderCalendario(){
  const adminOn = isAdmin();
  const today = new Date();
  if(V.calYear == null){ V.calYear = today.getFullYear(); V.calMonth = today.getMonth(); }
  const y = V.calYear, m = V.calMonth;
  const tareas = calendarioData.tareasPorDia || {};
  const firstWeekday = (new Date(y,m,1).getDay()+6)%7;
  const daysInMonth = new Date(y,m+1,0).getDate();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  let cells = "";
  for(let i=0;i<firstWeekday;i++) cells += `<div class="cal-day cal-day-empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = dateKey(y,m,d);
    const dayTareas = tareas[key] || [];
    const isToday = key === todayKey;
    cells += `
    <div class="cal-day ${isToday?"cal-day-today":""}">
      <div class="cal-day-num">${d}</div>
      <div class="cal-day-tasks">
        ${dayTareas.map((t,ti)=> `
          <div class="cal-day-task">
            <span>${escapeHtml(t)}</span>
            ${adminOn ? `<button class="cal-day-task-del no-print" data-action="cal-del-tarea-dia" data-date="${key}" data-idx="${ti}" aria-label="Eliminar tarea">×</button>` : ""}
          </div>`).join("")}
      </div>
      ${adminOn ? `<button class="cal-day-add no-print" data-action="cal-add-tarea-dia" data-date="${key}" aria-label="Añadir tarea">${icon("plus")}</button>` : ""}
    </div>`;
  }

  return `
  <button class="back-btn no-print" data-action="go-home">${icon("arrowLeft")}Volver</button>
  <div class="section-head"><h1>Calendario</h1></div>
  <div class="cal-nav">
    <button class="icon-btn no-print" data-action="cal-prev-month" aria-label="Mes anterior">${icon("arrowLeft")}</button>
    <h2>${MESES_ES[m]} ${y}</h2>
    <div style="display:flex; gap:8px;">
      <button class="icon-btn no-print" data-action="cal-next-month" aria-label="Mes siguiente" style="transform:scaleX(-1);">${icon("arrowLeft")}</button>
      <button class="pill-btn ghost no-print" data-action="cal-print">${icon("printer")}Imprimir</button>
    </div>
  </div>
  <div class="cal-grid">
    ${DIAS_ES.map(d=>`<div class="cal-day-label">${d}</div>`).join("")}
    ${cells}
  </div>
  <h2 style="margin-top:30px;">Listas de tareas</h2>
  ${renderCalSecciones(adminOn)}
  `;
}
function renderCalSecciones(adminOn){
  const secciones = calendarioData.secciones || [];
  let body;
  if(secciones.length === 0){
    body = adminOn ? "" : `<div class="empty-state">${icon("calendar")}<p>Todavía no hay nada planificado.</p></div>`;
  } else {
    body = secciones.map((sec, si)=> `
      <div class="cal-section">
        <div class="cal-section-head">
          <h3 ${adminOn?'contenteditable="true"':''} class="${adminOn?'editable':''}" data-action-blur="cal-titulo" data-si="${si}">${escapeHtml(sec.titulo||"")}</h3>
          ${adminOn ? `<button class="text-btn no-print" data-action="cal-del-seccion" data-si="${si}">${icon("trash")}</button>` : ""}
        </div>
        ${(sec.tareas||[]).map((t,ti)=> `
          <div class="cal-task">
            <div class="dot"></div>
            <div class="txt" ${adminOn?'contenteditable="true"':''} data-action-blur="cal-tarea" data-si="${si}" data-ti="${ti}">${escapeHtml(t)}</div>
            ${adminOn ? `<button class="text-btn no-print" data-action="cal-del-tarea" data-si="${si}" data-ti="${ti}">${icon("trash")}</button>` : ""}
          </div>`).join("")}
        ${adminOn ? `<div class="small-add-row no-print"><input type="text" placeholder="Añadir tarea..." data-action-enter="cal-add-tarea" data-si="${si}"><button class="text-btn" data-action="cal-add-tarea-btn" data-si="${si}">${icon("plus")}</button></div>` : ""}
      </div>`).join("");
  }
  return `
  ${body}
  ${adminOn ? `<div class="small-add-row no-print"><input type="text" placeholder="Nueva sección (ej. Semanal)..." data-action-enter="cal-add-seccion"><button class="pill-btn" data-action="cal-add-seccion-btn">${icon("plus")}Sección</button></div>` : ""}
  `;
}

/* ---------- lista de la compra ---------- */
function renderListaCompra(){
  const adminOn = isAdmin();
  const items = listaCompraData.items || [];
  let body;
  if(items.length === 0){
    body = adminOn ? "" : `<div class="empty-state">${icon("checklist")}<p>La lista está vacía.</p></div>`;
  } else {
    body = `<div class="cal-section">` + items.map((it, i)=> `
      <div class="shop-item ${it.marcada?'done':''}">
        <button class="shop-check" data-action="${adminOn?'shop-toggle':''}" data-i="${i}">${icon("check")}</button>
        <div class="shop-txt" ${adminOn?'contenteditable="true"':''} data-action-blur="shop-texto" data-i="${i}">${escapeHtml(it.texto||"")}</div>
        ${adminOn ? `<button class="text-btn" data-action="shop-del" data-i="${i}">${icon("trash")}</button>` : ""}
      </div>`).join("") + `</div>`;
  }
  return `
  <button class="back-btn" data-action="go-home">${icon("arrowLeft")}Volver</button>
  <div class="section-head"><h1>Lista de la compra</h1></div>
  ${body}
  ${adminOn ? `<div class="small-add-row"><input type="text" placeholder="Añadir producto..." data-action-enter="shop-add"><button class="pill-btn" data-action="shop-add-btn">${icon("plus")}Añadir</button></div>` : ""}
  `;
}

/* ---------- modales genéricos ---------- */
function openPrompt(opts){ V.promptModal = opts; renderApp(); const el=document.getElementById("promptInput"); if(el){ el.focus(); } }
function openConfirm(opts){ V.confirmModal = opts; renderApp(); }
function openAlert(opts){ V.alertModal = opts; renderApp(); }
function closeAllModals(){ V.showAdminModal = false; V.promptModal = null; V.confirmModal = null; V.alertModal = null; V.creditsModal = false; }

function submitPromptModal(){
  const input = document.getElementById("promptInput");
  if(!input) return;
  const v = input.value.trim();
  if(!v) return;
  const pm = V.promptModal;
  if(pm.submitAction === "create-ingrediente"){ const nid = newId(); saveDoc("ingredientes", nid, {nombre:v}); closeAllModals(); go("ingrediente", {id:nid}); }
  if(pm.submitAction === "create-formula"){
    const nid = newId();
    const data = {nombre:v};
    if(pm.categoriaId && pm.categoriaId !== "__sin__") data.categoriaId = pm.categoriaId;
    saveDoc("formulas", nid, data);
    closeAllModals(); go("formula", {id:nid});
  }
  if(pm.submitAction === "create-etiquetaInci"){ const nid = newId(); saveDoc("etiquetasInci", nid, {nombre:v}); closeAllModals(); go("etiquetaInci", {id:nid}); }
  if(pm.submitAction === "create-categoria"){ const nid = newId(); saveDoc("categoriasGuia", nid, {nombre:v}); closeAllModals(); renderApp(); }
  if(pm.submitAction === "create-tarea-dia"){
    const data = JSON.parse(JSON.stringify(calendarioData));
    if(!data.tareasPorDia) data.tareasPorDia = {};
    if(!data.tareasPorDia[pm.fecha]) data.tareasPorDia[pm.fecha] = [];
    data.tareasPorDia[pm.fecha].push(v);
    saveContenido("calendario", data);
    closeAllModals(); renderApp();
  }
}

function renderModals(){
  if(V.promptModal) return renderPromptModalHtml(V.promptModal);
  if(V.confirmModal) return renderConfirmModalHtml(V.confirmModal);
  if(V.alertModal) return renderAlertModalHtml(V.alertModal);
  if(V.showAdminModal) return renderAdminModalHtml();
  if(V.creditsModal) return renderCreditsModalHtml();
  return "";
}

function renderPromptModalHtml(pm){
  return `<div class="overlay" data-action="close-modal">
    <div class="modal" data-stop="1">
      <h3>${escapeHtml(pm.title)}</h3>
      <input type="text" id="promptInput" placeholder="${escapeHtml(pm.placeholder||"")}" autocomplete="off">
      <div class="modal-actions">
        <button class="pill-btn ghost" data-action="close-modal">Cancelar</button>
        <button class="pill-btn" data-action="prompt-submit">Crear</button>
      </div>
    </div>
  </div>`;
}
function renderConfirmModalHtml(cm){
  return `<div class="overlay" data-action="close-modal">
    <div class="modal" data-stop="1">
      <h3>${escapeHtml(cm.title)}</h3>
      <p>${escapeHtml(cm.message||"")}</p>
      <div class="modal-actions">
        <button class="pill-btn ghost" data-action="close-modal">Cancelar</button>
        <button class="pill-btn danger" data-action="confirm-yes">Eliminar</button>
      </div>
    </div>
  </div>`;
}
function renderAlertModalHtml(am){
  return `<div class="overlay" data-action="close-modal">
    <div class="modal" data-stop="1">
      <h3>${escapeHtml(am.title||"Aviso")}</h3>
      <p>${escapeHtml(am.message||"")}</p>
      <div class="modal-actions">
        <button class="pill-btn" data-action="close-modal">Entendido</button>
      </div>
    </div>
  </div>`;
}
function renderAdminModalHtml(){
  if(USE_FIREBASE){
    if(currentUser){
      const isReal = currentUser.uid === ADMIN_UID;
      return `<div class="overlay" data-action="close-modal">
        <div class="modal" data-stop="1">
          <div class="admin-status">
            <div class="avatar">${escapeHtml((currentUser.displayName||currentUser.email||"?").slice(0,1).toUpperCase())}</div>
            <div>
              <div style="font-size:.92rem;">${escapeHtml(currentUser.displayName||currentUser.email||"")}</div>
              <div style="font-size:.78rem;color:var(--ink-faint);">${isReal ? "Administradora" : "Sin permisos de edición"}</div>
            </div>
          </div>
          <p>${isReal ? "Tienes acceso completo de edición en el cuaderno." : `Esta cuenta no tiene permisos de edición. Para autorizarla, copia este UID en la constante ADMIN_UID del código: <code style="user-select:all;">${escapeHtml(currentUser.uid)}</code>`}</p>
          <div class="modal-actions">
            <button class="pill-btn ghost" data-action="close-modal">Cerrar</button>
            <button class="pill-btn" data-action="do-signout">Cerrar sesión</button>
          </div>
        </div>
      </div>`;
    }
    return `<div class="overlay" data-action="close-modal">
      <div class="modal" data-stop="1">
        <h3>Acceso administradora</h3>
        <p>Inicia sesión con la cuenta de Google autorizada para editar el cuaderno.</p>
        <div class="modal-actions">
          <button class="pill-btn ghost" data-action="close-modal">Cancelar</button>
          <button class="pill-btn" data-action="do-signin">Entrar con Google</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="overlay" data-action="close-modal">
    <div class="modal" data-stop="1">
      <h3>Modo local de pruebas</h3>
      <p>Firebase aún no está conectado. Puedes activar un modo edición de prueba para ver cómo funcionará, guardado solo en este navegador.</p>
      <div class="modal-actions">
        <button class="pill-btn ghost" data-action="close-modal">Cancelar</button>
        <button class="pill-btn" data-action="do-dev-toggle">${devAdminMode ? "Desactivar edición" : "Activar edición de prueba"}</button>
      </div>
    </div>
  </div>`;
}

/* =========================================================
   Delegación de eventos
   ========================================================= */
const appEl = document.getElementById("app");

appEl.addEventListener("click", e=>{
  if(e.target.closest("[data-stop]")) { /* clicks inside modal card don't close it */ }
  const overlay = e.target.closest(".overlay");
  if(overlay && e.target === overlay){ V.showAdminModal = false; renderApp(); return; }

  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const action = btn.dataset.action;
  const id = btn.dataset.id;

  switch(action){
    case "go-home": go("home"); break;
    case "go-ingredientes": go("ingredientes"); break;
    case "go-formulas": go("formulas"); break;
    case "go-etiquetasInci": go("etiquetasInci"); break;
    case "go-calendario": go("calendario"); break;
    case "go-lista": go("lista"); break;
    case "open-ingrediente": go("ingrediente", {id}); break;
    case "open-formula": go("formula", {id}); break;
    case "open-etiquetaInci": go("etiquetaInci", {id}); break;
    case "open-categoriaFormulas": go("categoriaFormulas", {categoriaId: btn.dataset.categoriaId}); break;
    case "toggle-admin": V.showAdminModal = true; renderApp(); break;
    case "open-credits": V.creditsModal = true; renderApp(); break;
    case "close-modal": closeAllModals(); renderApp(); break;
    case "do-signin": signInWithGoogle(); break;
    case "do-signout": signOutUser(); closeAllModals(); break;
    case "do-dev-toggle":
      devAdminMode = !devAdminMode;
      try{ localStorage.setItem(LS_KEYS.devAdmin, devAdminMode ? "1" : "0"); }catch(err){}
      closeAllModals(); renderApp(); break;
    case "prompt-submit": submitPromptModal(); break;
    case "confirm-yes": {
      const cm = V.confirmModal;
      if(cm){
        if(cm.confirmAction === "confirm-delete-ingrediente"){ deleteDoc("ingredientes", cm.targetId); closeAllModals(); go("ingredientes"); }
        if(cm.confirmAction === "confirm-delete-formula"){ deleteDoc("formulas", cm.targetId); closeAllModals(); go("formulas"); }
        if(cm.confirmAction === "confirm-delete-etiquetaInci"){ deleteDoc("etiquetasInci", cm.targetId); closeAllModals(); go("etiquetasInci"); }
        if(cm.confirmAction === "confirm-delete-categoria"){ deleteDoc("categoriasGuia", cm.targetId); closeAllModals(); go("formulas"); }
      }
      break;
    }
    case "add-ingredientes":
      openPrompt({ title:"Nuevo ingrediente", placeholder:"Ej. Vinagre de limpieza", submitAction:"create-ingrediente" });
      break;
    case "add-categoria":
      openPrompt({ title:"Nueva categoría", placeholder:"Ej. Limpieza de cocina", submitAction:"create-categoria" });
      break;
    case "add-formula-categoria":
      openPrompt({ title:"Nueva fórmula", placeholder:"Ej. Jabón lavavajillas a mano", submitAction:"create-formula", categoriaId: btn.dataset.categoriaId });
      break;
    case "add-etiquetasInci":
      openPrompt({ title:"Nueva etiqueta INCI", placeholder:"Ej. Sodium Laureth Sulfate", submitAction:"create-etiquetaInci" });
      break;
    case "delete-ingrediente":
      openConfirm({ title:"¿Eliminar esta ficha?", message:"Esta acción no se puede deshacer.", confirmAction:"confirm-delete-ingrediente", targetId:id });
      break;
    case "delete-formula":
      openConfirm({ title:"¿Eliminar esta ficha?", message:"Esta acción no se puede deshacer.", confirmAction:"confirm-delete-formula", targetId:id });
      break;
    case "delete-etiquetaInci":
      openConfirm({ title:"¿Eliminar esta ficha?", message:"Esta acción no se puede deshacer.", confirmAction:"confirm-delete-etiquetaInci", targetId:id });
      break;
    case "delete-categoria":
      openConfirm({ title:"¿Eliminar esta categoría?", message:"Las fórmulas que contenga pasarán a \"Sin categoría\". Esta acción no se puede deshacer.", confirmAction:"confirm-delete-categoria", targetId:id });
      break;
    case "change-photo":
      pendingPhotoTarget = { collection: btn.dataset.collection, id: btn.dataset.id };
      document.getElementById("hiddenPhotoInput").click();
      break;
    case "set-unidad": break; // handled on change event
    case "set-categoria-formula": break; // handled on change event
    case "set-rendimiento-unidad": break; // handled on change event
    case "set-moneda-unidad": break; // handled on change event
    case "set-receta-ingr-unidad": break; // handled on change event
    case "add-receta-ingr": {
      const fid = btn.dataset.id;
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.ingredientesList||[]), { cantidad:"", unidad:"ml", ingrediente:"" }];
      receta.ingredientesList = lista;
      saveDoc("formulas", fid, { receta });
      renderApp();
      break;
    }
    case "del-receta-ingr": {
      const fid = btn.dataset.id, idx = parseInt(btn.dataset.idx,10);
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.ingredientesList||[])];
      lista.splice(idx,1);
      receta.ingredientesList = lista;
      saveDoc("formulas", fid, { receta });
      renderApp();
      break;
    }
    case "add-receta-paso": {
      const fid = btn.dataset.id;
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.pasosList||[]), ""];
      receta.pasosList = lista;
      saveDoc("formulas", fid, { receta });
      renderApp();
      break;
    }
    case "del-receta-paso": {
      const fid = btn.dataset.id, idx = parseInt(btn.dataset.idx,10);
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.pasosList||[])];
      lista.splice(idx,1);
      receta.pasosList = lista;
      saveDoc("formulas", fid, { receta });
      renderApp();
      break;
    }
    case "cal-prev-month": {
      V.calMonth--;
      if(V.calMonth < 0){ V.calMonth = 11; V.calYear--; }
      renderApp();
      break;
    }
    case "cal-next-month": {
      V.calMonth++;
      if(V.calMonth > 11){ V.calMonth = 0; V.calYear++; }
      renderApp();
      break;
    }
    case "cal-print":
      if(isSafariBrowser()){
        openAlert({ title:"Imprimir en Safari", message:"En Safari, este botón puede tardar mucho en abrir el diálogo de impresión. Es más rápido usar Cmd+P (o Archivo → Imprimir) directamente." });
      } else {
        window.print();
      }
      break;
    case "cal-add-tarea-dia":
      openPrompt({ title:"Nueva tarea", placeholder:"Ej. Regar las plantas", submitAction:"create-tarea-dia", fecha: btn.dataset.date });
      break;
    case "cal-del-tarea-dia": {
      const fecha = btn.dataset.date, idx = parseInt(btn.dataset.idx,10);
      const data = JSON.parse(JSON.stringify(calendarioData));
      data.tareasPorDia[fecha].splice(idx,1);
      if(data.tareasPorDia[fecha].length === 0) delete data.tareasPorDia[fecha];
      saveContenido("calendario", data); renderApp();
      break;
    }
    case "cal-del-seccion": {
      const si = parseInt(btn.dataset.si,10);
      const data = JSON.parse(JSON.stringify(calendarioData));
      data.secciones.splice(si,1);
      saveContenido("calendario", data); renderApp();
      break;
    }
    case "cal-del-tarea": {
      const si = parseInt(btn.dataset.si,10), ti = parseInt(btn.dataset.ti,10);
      const data = JSON.parse(JSON.stringify(calendarioData));
      data.secciones[si].tareas.splice(ti,1);
      saveContenido("calendario", data); renderApp();
      break;
    }
    case "cal-add-seccion-btn": addCalSeccion(btn.parentElement.querySelector("input")); break;
    case "cal-add-tarea-btn": {
      const si = parseInt(btn.dataset.si,10);
      addCalTarea(si, btn.parentElement.querySelector("input"));
      break;
    }
    case "shop-toggle": {
      const i = parseInt(btn.dataset.i,10);
      const data = JSON.parse(JSON.stringify(listaCompraData));
      data.items[i].marcada = !data.items[i].marcada;
      saveContenido("lista", data); renderApp();
      break;
    }
    case "shop-del": {
      const i = parseInt(btn.dataset.i,10);
      const data = JSON.parse(JSON.stringify(listaCompraData));
      data.items.splice(i,1);
      saveContenido("lista", data); renderApp();
      break;
    }
    case "shop-add-btn": addShopItem(btn.parentElement.querySelector("input")); break;
    case "add-ingrediente-to-shopping": {
      const nombre = btn.dataset.nombre;
      const data = JSON.parse(JSON.stringify(listaCompraData));
      const yaExiste = data.items.some(it=> it.texto === nombre);
      if(!yaExiste){
        data.items.push({ texto: nombre, marcada: false });
        saveContenido("lista", data);
      }
      btn.innerHTML = icon("check");
      setTimeout(()=>{ btn.innerHTML = icon("plus"); }, 1200);
      showToast(`"${nombre}" añadido a la lista de la compra`);
      break;
    }
  }
});

appEl.addEventListener("change", e=>{
  if(e.target.matches('select[data-action="set-unidad"]')){
    const id = e.target.dataset.id;
    const d = formulasData[id];
    const producto = { ...(d.producto||{}), unidad: e.target.value };
    saveDoc("formulas", id, { producto });
    renderApp();
  }
  if(e.target.matches('select[data-action="set-categoria-formula"]')){
    const id = e.target.dataset.id;
    saveDoc("formulas", id, { categoriaId: e.target.value || null });
    renderApp();
  }
  if(e.target.matches('select[data-action="set-rendimiento-unidad"]')){
    const id = e.target.dataset.id;
    const d = formulasData[id];
    const receta = { ...(d.receta||{}), rendimientoUnidad: e.target.value };
    saveDoc("formulas", id, { receta });
    renderApp();
  }
  if(e.target.matches('select[data-action="set-moneda-unidad"]')){
    const id = e.target.dataset.id;
    const d = formulasData[id];
    const producto = { ...(d.producto||{}), monedaUnidad: e.target.value };
    saveDoc("formulas", id, { producto });
    renderApp();
  }
  if(e.target.matches('select[data-action="set-receta-ingr-unidad"]')){
    const id = e.target.dataset.id, idx = parseInt(e.target.dataset.idx,10);
    const d = formulasData[id];
    const receta = { ...(d.receta||{}) };
    const lista = [...(receta.ingredientesList||[])];
    lista[idx] = { ...lista[idx], unidad: e.target.value };
    receta.ingredientesList = lista;
    saveDoc("formulas", id, { receta });
  }
});

appEl.addEventListener("keydown", e=>{
  if(e.key === "Enter" && e.target.id === "promptInput"){ e.preventDefault(); submitPromptModal(); return; }
  if(e.key === "Enter" && e.target.matches("input[data-action-enter]")){
    e.preventDefault();
    const action = e.target.dataset.actionEnter;
    if(action === "cal-add-seccion") addCalSeccion(e.target);
    if(action === "cal-add-tarea") addCalTarea(parseInt(e.target.dataset.si,10), e.target);
    if(action === "shop-add") addShopItem(e.target);
  }
});

function addCalSeccion(input){
  const v = input.value.trim();
  if(!v) return;
  const data = JSON.parse(JSON.stringify(calendarioData));
  if(!data.secciones) data.secciones = [];
  data.secciones.push({ titulo: v, tareas: [] });
  saveContenido("calendario", data);
  renderApp();
}
function addCalTarea(si, input){
  const v = input.value.trim();
  if(!v) return;
  const data = JSON.parse(JSON.stringify(calendarioData));
  data.secciones[si].tareas.push(v);
  saveContenido("calendario", data);
  renderApp();
}
function addShopItem(input){
  const v = input.value.trim();
  if(!v) return;
  const data = JSON.parse(JSON.stringify(listaCompraData));
  data.items.push({ texto: v, marcada: false });
  saveContenido("lista", data);
  renderApp();
}

/* ---------- guardado de campos editables (contenteditable) ---------- */
appEl.addEventListener("focusout", e=>{
  const el = e.target.closest("[data-field]");
  if(el){
    const collection = el.dataset.collection, id = el.dataset.id, field = el.dataset.field, sub = el.dataset.sub;
    const value = el.innerText.replace(/\n+$/,"");
    if(sub){
      const d = getStoreFor(collection)[id];
      const subObj = { ...((d && d[sub]) || {}), [field]: value };
      saveDoc(collection, id, { [sub]: subObj });
    } else {
      saveDoc(collection, id, { [field]: value });
    }
    if(sub === "producto" && (field === "cantidad" || field === "precioEnvase")){
      renderApp();
    }
    return;
  }
  const blurEl = e.target.closest("[data-action-blur]");
  if(blurEl){
    const kind = blurEl.dataset.actionBlur;
    const value = blurEl.innerText;
    if(kind === "cal-titulo"){
      const si = parseInt(blurEl.dataset.si,10);
      const data = JSON.parse(JSON.stringify(calendarioData));
      data.secciones[si].titulo = value;
      saveContenido("calendario", data);
    } else if(kind === "cal-tarea"){
      const si = parseInt(blurEl.dataset.si,10), ti = parseInt(blurEl.dataset.ti,10);
      const data = JSON.parse(JSON.stringify(calendarioData));
      data.secciones[si].tareas[ti] = value;
      saveContenido("calendario", data);
    } else if(kind === "shop-texto"){
      const i = parseInt(blurEl.dataset.i,10);
      const data = JSON.parse(JSON.stringify(listaCompraData));
      data.items[i].texto = value;
      saveContenido("lista", data);
    } else if(kind === "receta-ingr-cantidad" || kind === "receta-ingr-nombre"){
      const fid = blurEl.dataset.id, idx = parseInt(blurEl.dataset.idx,10);
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.ingredientesList||[])];
      const part = kind === "receta-ingr-cantidad" ? "cantidad" : "ingrediente";
      lista[idx] = { ...lista[idx], [part]: value };
      receta.ingredientesList = lista;
      saveDoc("formulas", fid, { receta });
    } else if(kind === "receta-paso"){
      const fid = blurEl.dataset.id, idx = parseInt(blurEl.dataset.idx,10);
      const fd = formulasData[fid];
      const receta = { ...(fd.receta||{}) };
      const lista = [...(receta.pasosList||[])];
      lista[idx] = value;
      receta.pasosList = lista;
      saveDoc("formulas", fid, { receta });
    }
  }
});
